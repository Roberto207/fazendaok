# ============================================================================
# CONFIGURAÇÃO DO ALEMBIC - PLATAFORMA FAZENDAOK
# ============================================================================
# Este arquivo configura o Alembic para gerenciar migrações do banco de dados
# PostgreSQL + PostGIS da Plataforma FazendaOk.
#
# O Alembic está configurado para trabalhar com SQLAlchemy assíncrono.
# A URL do banco de dados é carregada automaticamente de app/config.py.
# ============================================================================

[alembic]
# Caminho para os scripts de migração
# Este caminho é relativo à localização deste arquivo .ini
script_location = %(here)s/backend/alembic

# Template usado para gerar nomes de arquivos de migração
# O padrão é %%(rev)s_%%(slug)s (ex: abc123_adicionar_coluna_status)
# Descomente a linha abaixo para adicionar data/hora aos nomes dos arquivos:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Caminho sys.path que será adicionado ao início do sys.path
# Isso permite importar módulos da aplicação (como app.models)
prepend_sys_path = .

# Fuso horário para renderizar datas nos arquivos de migração
# Deixe em branco para usar o horário local
# Requer a biblioteca tzdata: pip install alembic[tz]
# timezone = America/Sao_Paulo

# Comprimento máximo de caracteres para o campo "slug" no nome do arquivo
# truncate_slug_length = 40

# Executar o ambiente durante o comando 'revision', independente de autogenerate
# revision_environment = false

# Permitir arquivos .pyc e .pyo sem arquivo .py fonte no diretório versions/
# sourceless = false

# Localização das versões de migração
# Por padrão, usa <script_location>/versions
# Para múltiplos diretórios, use:
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Separador de caminho usado para dividir listas de caminhos
# Valores válidos: os (usa os.pathsep), :, ;, space, newline
path_separator = os

# Buscar arquivos fonte recursivamente em cada diretório "version_locations"
# Novo no Alembic versão 1.10
# recursive_version_locations = false

# Codificação de saída usada ao escrever arquivos de revisão
output_encoding = utf-8

# ============================================================================
# URL DO BANCO DE DADOS
# ============================================================================
# NOTA IMPORTANTE: A URL do banco de dados é carregada automaticamente
# de app.config.settings no arquivo env.py. Não é necessário definir
# sqlalchemy.url aqui. O valor é lido da variável de ambiente DATABASE_URL.
#
# Formato esperado:
# DATABASE_URL=postgresql+asyncpg://usuario:senha@localhost:5432/fazendaok
# ============================================================================
# sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint with attempts to fix using "ruff" - use the module runner, against the "ruff" module
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Alternatively, use the exec runner to execute a binary found on your PATH
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging configuration.  This is also consumed by the user-maintained
# env.py script only.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
